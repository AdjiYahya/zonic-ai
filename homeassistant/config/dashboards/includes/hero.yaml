type: custom:button-card
icon: mdi:robot-happy

name: Zonic

show_name: true
show_label: true
show_icon: true

label: >
  [[[
    const now = new Date();
    const hour = now.getHours();

    let greeting = "Good Evening";

    if (hour < 12)
      greeting = "Good Morning";
    else if (hour < 17)
      greeting = "Good Afternoon";

    const time = now.toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit"
    });

    const date = now.toLocaleDateString("en-GB",{
      weekday:"long",
      day:"2-digit",
      month:"long"
    });

    return `
      ${greeting}, Adji 👋
      <br><br>
      <span style="font-size:15px">
      ${date}
      </span>
      <br>
      <span style="font-size:18px;font-weight:600">
      ${time}
      </span>

      <br><br>

      <span style="opacity:.75">
      Everything is running normally
      </span>
    `;
  ]]]

styles:

  grid:
    - grid-template-areas: '"i n" "i l"'
    - grid-template-columns: 70px auto

  card:
    - border-radius: 28px
    - padding: 28px
    - height: 220px
    - background: linear-gradient(135deg,#5B3DF5,#8E6BFF)
    - box-shadow: 0px 12px 30px rgba(0,0,0,.35)

  icon:
    - color: white
    - width: 50px

  name:
    - color: white
    - font-size: 34px
    - font-weight: bold
    - justify-self: start

  label:
    - color: white
    - justify-self: start
    - text-align: left
    - white-space: normal
    - line-height: 1.5