title: Zonic

views:
  - title: Home
    path: home
    icon: mdi:home

    type: custom:grid-layout

    layout:

      grid-template-columns: repeat(12, 1fr)
      grid-template-rows: auto
      grid-gap: 16px
      margin: 16px

      mediaquery:

        "(max-width: 800px)":

          grid-template-columns: 1fr

    cards:

      ####################################################
      # HERO
      ####################################################

      - type: custom:mod-card
        style: |
          ha-card {
            background: none;
            box-shadow:none;
          }
        card: !include includes/hero.yaml

        view_layout:
          grid-column: span 12

      ####################################################
      # LIGHTS
      ####################################################

      - type: custom:mod-card
        style: |
          ha-card {
            background:none;
            box-shadow:none;
          }
        card: !include includes/lights.yaml

        view_layout:
          grid-column: span 12

      ####################################################
      # LEFT
      ####################################################

      - type: vertical-stack

        cards:

          - !include includes/entertainment.yaml

          - !include includes/ai.yaml

        view_layout:
          grid-column: span 7

      ####################################################
      # RIGHT
      ####################################################

      - type: vertical-stack

        cards:

          - !include includes/monitor.yaml

        view_layout:
          grid-column: span 5